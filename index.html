<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cottage Notes 🌿</title>
<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(#f5f0e6, #e8dfd2);
    color: #4a3f35;
    text-align: center;
}

header {
    padding: 20px;
    font-size: 28px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(5px);
}

.container {
    padding: 20px;
}

textarea {
    width: 80%;
    height: 80px;
    border-radius: 10px;
    border: 1px solid #ccc;
    padding: 10px;
    font-size: 16px;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    background: #a3b18a;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

.note {
    background: #fffaf3;
    margin: 15px auto;
    padding: 15px;
    border-radius: 12px;
    width: 80%;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

img {
    max-width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>🌿 Cozy Cottage Notes</header>

<audio autoplay loop>
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b06f6.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <textarea id="noteInput" placeholder="Write your thoughts... 🌸"></textarea><br>
    <input type="file" id="imageInput"><br>
    <button onclick="addNote()">Add Note</button>

    <div id="notesContainer"></div>
</div>

<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];

function saveNotes() {
    localStorage.setItem("notes", JSON.stringify(notes));
}

function renderNotes() {
    const container = document.getElementById("notesContainer");
    container.innerHTML = "";

    notes.forEach(n => {
        const div = document.createElement("div");
        div.className = "note";
        div.innerHTML = `<p>${n.text}</p>`;
        if(n.img){
            div.innerHTML += `<img src="${n.img}">`;
        }
        container.appendChild(div);
    });
}

function addNote() {
    const text = document.getElementById("noteInput").value;
    const file = document.getElementById("imageInput").files[0];

    if(file){
        const reader = new FileReader();
        reader.onload = function(e){
            notes.push({text: text, img: e.target.result});
            saveNotes();
            renderNotes();
        }
        reader.readAsDataURL(file);
    } else {
        notes.push({text: text});
        saveNotes();
        renderNotes();
    }

    document.getElementById("noteInput").value = "";
}

renderNotes();
</script>

</body>
</html>
